<body class="bg-background min-h-screen flex items-center justify-center p-margin-mobile md:p-margin-desktop text-on-surface">
<!-- Note: TopAppBar and BottomNavBar are suppressed as this is a linear/transactional login page. -->
<main class="w-full max-w-md bg-surface-container-lowest rounded-xl shadow-[0_4px_20px_rgba(0,102,255,0.05)] border border-outline-variant/30 p-8 flex flex-col items-center">
<!-- Brand Logo Area -->
<div class="mb-8 flex flex-col items-center">
<div class="w-16 h-16 bg-primary-container rounded-full flex items-center justify-center mb-4 shadow-[0_4px_20px_rgba(0,102,255,0.2)]">
<span class="material-symbols-outlined text-on-primary-container text-4xl" data-icon="health_and_safety" style="font-variation-settings: 'FILL' 1;">health_and_safety</span>
</div>
<h1 class="text-headline-md font-headline-md text-primary text-center">AYAK</h1>
<p class="text-body-sm font-body-sm text-on-surface-variant mt-2 text-center">Sign in to your account</p>
</div>
<!-- Login Form -->
<form class="w-full space-y-6">
<!-- Email Input -->
<div class="space-y-2">
<label class="text-label-md font-label-md text-on-surface block" for="email">Email Address</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline" data-icon="mail">mail</span>
</div>
<input class="w-full pl-10 pr-4 py-3 bg-background border border-outline-variant rounded-lg text-body-md font-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-3 focus:ring-primary/20 transition-all placeholder:text-outline/70" id="email" name="email" placeholder="name@example.com" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="text-label-md font-label-md text-on-surface block" for="password">Password</label>
<a class="text-label-sm font-label-sm text-primary hover:text-primary-container transition-colors" href="#">Forgot password?</a>
</div>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline" data-icon="lock">lock</span>
</div>
<input class="w-full pl-10 pr-10 py-3 bg-background border border-outline-variant rounded-lg text-body-md font-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-3 focus:ring-primary/20 transition-all placeholder:text-outline/70" id="password" name="password" placeholder="••••••••" type="password"/>
<button class="absolute inset-y-0 right-0 pr-3 flex items-center text-outline hover:text-primary transition-colors focus:outline-none" type="button">
<span class="material-symbols-outlined" data-icon="visibility_off">visibility_off</span>
</button>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center">
<input class="h-4 w-4 rounded border-outline-variant text-primary focus:ring-primary/20 bg-background cursor-pointer" id="remember-me" name="remember-me" type="checkbox"/>
<label class="ml-2 block text-body-sm font-body-sm text-on-surface-variant cursor-pointer" for="remember-me">
                    Remember me for 30 days
                </label>
</div>
<!-- Submit Button -->
<button class="w-full bg-primary hover:bg-primary-container text-on-primary text-label-lg font-label-lg py-3 px-4 rounded-lg shadow-md transition-all active:scale-[0.98] flex items-center justify-center gap-2 mt-4" type="submit">
                Login
                <span class="material-symbols-outlined text-[20px]" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<!-- Sign Up Link -->
<div class="mt-8 pt-6 border-t border-outline-variant/30 w-full text-center">
<p class="text-body-sm font-body-sm text-on-surface-variant">
                Don't have an account? 
                <a class="text-primary font-semibold hover:text-primary-container transition-colors" href="#">Sign up</a>
</p>
</div>
</main>
</body></html>
