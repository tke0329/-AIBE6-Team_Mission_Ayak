<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>AYAK - Sign Up</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Manrope:wght@600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-secondary-fixed-variant": "#004e60",
                        "on-tertiary-fixed-variant": "#005313",
                        "outline": "#727687",
                        "surface-container-high": "#dce9ff",
                        "on-tertiary": "#ffffff",
                        "tertiary-fixed": "#70ff76",
                        "secondary": "#00677f",
                        "outline-variant": "#c2c6d8",
                        "on-primary": "#ffffff",
                        "on-secondary-fixed": "#001f28",
                        "tertiary-fixed-dim": "#42e355",
                        "on-primary-fixed-variant": "#003fa4",
                        "surface-container-lowest": "#ffffff",
                        "primary": "#0050cb",
                        "background": "#f8f9ff",
                        "surface": "#f8f9ff",
                        "primary-container": "#0066ff",
                        "tertiary-container": "#008423",
                        "on-primary-container": "#f8f7ff",
                        "primary-fixed": "#dae1ff",
                        "on-secondary-container": "#005266",
                        "on-background": "#0b1c30",
                        "secondary-fixed": "#b7eaff",
                        "on-surface": "#0b1c30",
                        "primary-fixed-dim": "#b3c5ff",
                        "secondary-fixed-dim": "#4cd6ff",
                        "on-secondary": "#ffffff",
                        "surface-variant": "#d3e4fe",
                        "surface-dim": "#cbdbf5",
                        "tertiary": "#00681a",
                        "on-tertiary-container": "#e5ffdc",
                        "surface-container-low": "#eff4ff",
                        "inverse-primary": "#b3c5ff",
                        "inverse-surface": "#213145",
                        "surface-container": "#e5eeff",
                        "inverse-on-surface": "#eaf1ff",
                        "error-container": "#ffdad6",
                        "surface-bright": "#f8f9ff",
                        "secondary-container": "#00ccf9",
                        "on-error": "#ffffff",
                        "on-tertiary-fixed": "#002204",
                        "surface-tint": "#0054d6",
                        "surface-container-highest": "#d3e4fe",
                        "on-primary-fixed": "#001849",
                        "on-error-container": "#93000a",
                        "on-surface-variant": "#424656",
                        "error": "#ba1a1a"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "margin-desktop": "40px",
                        "gutter-mobile": "16px",
                        "base": "8px",
                        "gutter-desktop": "24px",
                        "margin-mobile": "16px",
                        "container-max": "1280px"
                    },
                    "fontFamily": {
                        "label-md": ["Inter"],
                        "body-sm": ["Inter"],
                        "headline-lg-mobile": ["Manrope"],
                        "headline-sm": ["Manrope"],
                        "body-lg": ["Inter"],
                        "body-md": ["Inter"],
                        "label-lg": ["Inter"],
                        "label-sm": ["Inter"],
                        "headline-lg": ["Manrope"],
                        "headline-md": ["Manrope"]
                    },
                    "fontSize": {
                        "label-md": ["12px", { "lineHeight": "16px", "fontWeight": "500" }],
                        "body-sm": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "headline-lg-mobile": ["24px", { "lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "700" }],
                        "headline-sm": ["20px", { "lineHeight": "28px", "fontWeight": "600" }],
                        "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "label-lg": ["14px", { "lineHeight": "20px", "letterSpacing": "0.05em", "fontWeight": "600" }],
                        "label-sm": ["10px", { "lineHeight": "14px", "fontWeight": "500" }],
                        "headline-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "headline-md": ["24px", { "lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600" }]

                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined.filled {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background min-h-screen flex items-center justify-center p-margin-mobile md:p-margin-desktop font-body-md text-on-background">
<!-- Signup Container -->
<main class="w-full max-w-md bg-surface-container-lowest rounded-xl shadow-[0_4px_20px_rgba(0,102,255,0.05)] overflow-hidden border border-outline-variant/30 flex flex-col">
<!-- Header / Logo Area -->
<header class="pt-8 pb-4 px-6 flex flex-col items-center justify-center border-b border-outline-variant/30 bg-surface">
<h1 class="text-headline-lg font-headline-lg text-primary md:text-headline-lg md:font-headline-lg hidden md:block">AYAK</h1>
<h1 class="text-headline-lg-mobile font-headline-lg-mobile text-primary md:hidden">AYAK</h1>
<p class="text-body-sm font-body-sm text-on-surface-variant mt-2 text-center">Create your secure healthcare account.</p>
</header>
<!-- Form Area -->
<section class="p-6 md:p-8 flex-grow flex flex-col gap-6">
<form action="#" class="flex flex-col gap-5" method="POST">
<!-- Email Input -->
<div class="flex flex-col gap-1">
<label class="text-label-md font-label-md text-on-surface" for="email">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline">mail</span>
<input class="w-full pl-10 pr-4 py-3 bg-background border border-outline-variant rounded-lg text-body-md font-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-3 focus:ring-primary/20 transition-all placeholder:text-outline/70" id="email" name="email" placeholder="name@example.com" required="" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-1">
<label class="text-label-md font-label-md text-on-surface" for="password">Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline">lock</span>
<input class="w-full pl-10 pr-10 py-3 bg-background border border-outline-variant rounded-lg text-body-md font-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-3 focus:ring-primary/20 transition-all placeholder:text-outline/70" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button aria-label="Toggle password visibility" class="absolute right-3 top-1/2 -translate-y-1/2 text-outline hover:text-primary transition-colors focus:outline-none" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<!-- Confirm Password Input -->
<div class="flex flex-col gap-1">
<label class="text-label-md font-label-md text-on-surface" for="confirm_password">Confirm Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline">lock</span>
<input class="w-full pl-10 pr-10 py-3 bg-background border border-outline-variant rounded-lg text-body-md font-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-3 focus:ring-primary/20 transition-all placeholder:text-outline/70" id="confirm_password" name="confirm_password" placeholder="••••••••" required="" type="password"/>
<button aria-label="Toggle confirm password visibility" class="absolute right-3 top-1/2 -translate-y-1/2 text-outline hover:text-primary transition-colors focus:outline-none" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<!-- Terms and Conditions -->
<div class="flex items-start gap-2 mt-2">
<input class="mt-1 w-4 h-4 rounded border-outline-variant text-primary focus:ring-primary bg-background" id="terms" name="terms" required="" type="checkbox"/>
<label class="text-body-sm font-body-sm text-on-surface-variant" for="terms">
                        I agree to the <a class="text-primary hover:underline focus:outline-none focus:ring-2 focus:ring-primary rounded" href="#">Terms of Service</a> and <a class="text-primary hover:underline focus:outline-none focus:ring-2 focus:ring-primary rounded" href="#">Privacy Policy</a>.
                    </label>
</div>
<!-- Submit Button -->
<button class="mt-4 w-full bg-primary text-on-primary py-3 px-6 rounded-lg text-label-lg font-label-lg hover:bg-surface-tint focus:outline-none focus:ring-4 focus:ring-primary/30 transition-all active:scale-[0.98] shadow-md flex items-center justify-center gap-2" type="submit">
                    Sign Up
                    <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
</form>
<!-- Login Link -->
<div class="text-center mt-2">
<p class="text-body-sm font-body-sm text-on-surface-variant">
                    Already have an account? <a class="text-primary font-medium hover:underline focus:outline-none focus:ring-2 focus:ring-primary rounded px-1" href="#">Log in</a>
</p>
</div>
</section>
</main>
</body></html>
